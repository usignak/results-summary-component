<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
  
  <title>Frontend Mentor | Results summary component</title>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="container">
    <div class="container__item">
      <h1 class="title title--h1">Your Result</h1>
      <div class="result">
        <strong>76</strong>
        <span>of 100</span>
      </div>
      <div class="info">Great</div>
      <p class="text">You scored higher than 65% of the people who have taken these tests.</p>
    </div>
    <div class="container__item">
      <h2 class="title title--h2">Summary</h2>
      <table id="summary-list" class="summary-list"></table>
      <button type="button" class="btn">Continue</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
